        pointerId: event.pointerId,
        boatIndex: hit.rig.boatIndex,
        offsetX: boat.x - p.x,
        offsetY: boat.y - p.y
      };
    if (state.drag.type === "sail") {
      const key = state.drag.sailName === "main" ? "mainDeg" : "jibDeg";
      state.lastSailDragValue = boat[key];
      updateSailTrimFromPointer(state.drag, p);
    } else if (state.drag.type === "tiller") {
      state.lastHeadingDragDeg = boat.headingDeg;
      state.lastTillerDragDeg = boat.tillerDeg || 0;
      updateTillerFromPointer(state.drag, p);
    }
    canvas.setPointerCapture(event.pointerId);
    canvas.style.cursor = "grabbing";
  }

  function handlePointerMove(event) {
    const p = eventWorldPoint(event);
    if (state.drag) {
      event.preventDefault();
      if (state.drag.type === "sail") {
        updateSailTrimFromPointer(state.drag, p);
      } else if (state.drag.type === "tiller") {
        updateTillerFromPointer(state.drag, p);
      } else {
        const boat = state.boats[state.drag.boatIndex];
        boat.x = p.x + state.drag.offsetX;
        boat.y = p.y + state.drag.offsetY;
      }
      canvas.style.cursor = "grabbing";
      return;
    }

    const hit = findCanvasHitAtPoint(p);
    canvas.style.cursor = hit ? "grab" : "zoom-in";
  }

  function finishPointerDrag(event) {
    if (!state.drag) return;
    if (canvas.hasPointerCapture(event.pointerId)) {
      canvas.releasePointerCapture(event.pointerId);
    }
    state.drag = null;
    state.lastHeadingDragDeg = null;
    state.lastSailDragValue = null;
    state.lastTillerDragDeg = null;
    canvas.style.cursor = "grab";
  }

  function selectBoat(index) {
    if (index === 1 && !state.secondBoat) return;
    state.activeBoat = index;
    syncInputsFromActiveBoat();
    updateControls();
    paintBackground();
  }

  boatOne.addEventListener("click", () => {
    selectBoat(0);
  });

  boatTwo.addEventListener("click", () => {
    selectBoat(1);
  });

  boatTwoToggle.addEventListener("click", () => {
    state.secondBoat = !state.secondBoat;
    state.activeBoat = state.secondBoat ? 1 : 0;
    syncInputsFromActiveBoat();
    state.particles.forEach((p) => resetParticle(p, true));
    updateControls();
    paintBackground();
  });

  rigSingle.addEventListener("click", () => {
    activeBoat().rig = "single";
    updateControls();
  });

  rigTwin.addEventListener("click", () => {
    activeBoat().rig = "twin";
    updateControls();
  });

  pressureToggle.addEventListener("click", () => {
    state.pressure = !state.pressure;
    updateControls();
    paintBackground();
  });

  vectorsToggle.addEventListener("click", () => {
    state.vectors = !state.vectors;
    updateControls();
    paintBackground();
  });

  eddiesToggle.addEventListener("click", () => {
    state.eddies = !state.eddies;
    updateControls();
    paintBackground();
  });

  centreboardToggle.addEventListener("click", () => {
    state.centreboardGuide = !state.centreboardGuide;
    updateControls();
    paintBackground();
  });

  headingInput.addEventListener("input", () => {
    setRecommendedTrimForHeading();
    updateControls();
    paintBackground();
  });

  for (const input of [mainInput, jibInput]) {
    input.addEventListener("input", () => {
      updateControls();
      paintBackground();
    });
  }

  window.addEventListener("resize", resize);
  stage.addEventListener("wheel", handleWheelZoom, { passive: false });
  canvas.addEventListener("pointerdown", handlePointerDown);
  canvas.addEventListener("pointermove", handlePointerMove);
  canvas.addEventListener("pointerup", finishPointerDrag);
  canvas.addEventListener("pointercancel", finishPointerDrag);
  canvas.addEventListener("pointerleave", (event) => {
    if (!state.drag) canvas.style.cursor = "grab";
    else if (event.pointerId === state.drag.pointerId) canvas.style.cursor = "grabbing";
  });
  setRecommendedTrimForHeading();
  updateControls();
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
