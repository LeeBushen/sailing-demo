<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dinghy Sail Airflow Lab</title>
</head>
<body>
<div id="app-root"></div>
<script>
(function () {
  const root = document.getElementById("app-root");
  root.innerHTML = `
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f7f2;
        --panel: #ffffff;
        --ink: #18201d;
        --muted: #5d6962;
        --line: #cfd9d1;
        --water-a: #d9e9e4;
        --water-b: #eef4ed;
        --accent: #087f7a;
        --accent-2: #d86f34;
        --accent-3: #6148b4;
        --sail: #fbfbf8;
        --sail-edge: #55625b;
        --shadow: rgba(22, 36, 30, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      body {
        min-height: 100vh;
      }

      .sail-app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 18px;
        padding: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 40px var(--shadow);
        padding: 18px;
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 1.32rem;
        line-height: 1.15;
        font-weight: 500;
        letter-spacing: 0;
      }

      .subtitle {
        margin: -8px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.38;
      }

      .control-group {
        display: grid;
        gap: 10px;
      }

      .control-title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.92rem;
        font-weight: 500;
      }

      .value {
        color: var(--muted);
        font-weight: 500;
        white-space: nowrap;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      button {
        font: inherit;
      }

      .segmented button,
      .icon-button {
        border: 1px solid var(--line);
        background: #f8faf7;
        color: var(--ink);
        border-radius: 7px;
        padding: 10px 12px;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
      }

      .segmented button[aria-pressed="true"] {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .icon-button {
        width: 100%;
        text-align: center;
      }

      .icon-button[aria-pressed="true"] {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .segmented button:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      label {
        display: grid;
        gap: 8px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      input[type="range"]:disabled {
        opacity: 0.35;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfcfa;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 0.98rem;
        line-height: 1.18;
        font-weight: 500;
      }

      .note {
        margin: 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .panel-footer {
        margin-top: auto;
        display: grid;
        gap: 12px;
      }

      .club-logo {
        display: block;
        width: 100%;
        max-width: 306px;
        height: auto;
        border-radius: 6px;
      }

      .stage {
        position: relative;
        min-height: 680px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background:
          radial-gradient(circle at 22% 15%, rgba(216, 111, 52, 0.10), transparent 24%),
          linear-gradient(180deg, var(--water-a), var(--water-b));
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 680px;
        cursor: grab;
        touch-action: none;
      }

      .wind-label {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(207, 217, 209, 0.9);
        border-radius: 8px;
        padding: 9px 12px;
        color: var(--ink);
        font-size: 0.9rem;
        backdrop-filter: blur(10px);
      }

      .wind-arrow {
        width: 18px;
        height: 54px;
        position: relative;
      }

      .wind-arrow::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 1px;
        width: 2px;
        height: 42px;
        background: var(--accent-2);
      }

      .wind-arrow::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 37px;
        width: 14px;
        height: 14px;
        border-right: 2px solid var(--accent-2);
        border-bottom: 2px solid var(--accent-2);
        transform: rotate(45deg);
      }

      .legend {
        position: absolute;
        left: 18px;
        bottom: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: calc(100% - 36px);
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(207, 217, 209, 0.9);
        border-radius: 8px;
        padding: 9px 10px;
        backdrop-filter: blur(10px);
        color: var(--muted);
        font-size: 0.82rem;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .swatch {
        width: 22px;
        height: 3px;
        border-radius: 999px;
        background: var(--accent);
      }

      .swatch.low {
        background: #4377c4;
      }

      .swatch.high {
        background: #d86f34;
      }

      .swatch.force {
        background: var(--accent-3);
      }

      .swatch.eddy {
        background: repeating-linear-gradient(90deg, var(--accent-2) 0 7px, transparent 7px 12px);
        border: 1px solid rgba(216, 111, 52, 0.35);
        height: 8px;
      }

      .swatch.telltale {
        height: 7px;
        background: linear-gradient(90deg, var(--accent) 0 42%, transparent 42% 58%, var(--accent-2) 58%);
      }

      @media (max-width: 850px) {
        .sail-app {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .panel {
          align-self: auto;
        }

        .stage,
        canvas {
          min-height: 560px;
        }
      }

      @media (max-width: 520px) {
        .sail-app {
          gap: 12px;
        }

        .metric-grid {
          grid-template-columns: 1fr;
        }

        .segmented {
          grid-template-columns: 1fr;
        }

        .wind-label {
          top: 10px;
          left: 50%;
          padding: 8px 10px;
        }

        .legend {
          left: 10px;
          right: 10px;
          bottom: 10px;
        }
      }
    </style>

    <main class="sail-app" aria-label="Sailing dinghy airflow simulator">
      <section class="panel" aria-label="Simulator controls">
        <h1>Dinghy sail airflow lab</h1>
        <p class="subtitle">Animated streamlines respond to boat heading, mainsheet trim, and jib trim.</p>

        <div class="control-group">
          <div class="control-title">Configure boat</div>
          <div class="segmented" role="group" aria-label="Selected boat">
            <button type="button" id="boat-one" aria-pressed="true">Boat 1</button>
            <button type="button" id="boat-two" aria-pressed="false" disabled>Boat 2</button>
          </div>
          <button type="button" class="icon-button" id="boat-two-toggle" aria-pressed="false">Add second boat</button>
        </div>

        <div class="control-group">
          <div class="control-title">Rig</div>
          <div class="segmented" role="group" aria-label="Dinghy rig">
            <button type="button" id="rig-single" aria-pressed="false">Single-handed</button>
            <button type="button" id="rig-twin" aria-pressed="true">Twin-sailed</button>
          </div>
        </div>

        <label class="control-group">
          <span class="control-title">Heading to wind <span class="value" id="heading-value"></span></span>
          <input id="heading" type="range" min="-180" max="180" value="45" step="1" aria-label="Boat heading relative to the wind">
        </label>

        <label class="control-group">
          <span class="control-title">Mainsail boom <span class="value" id="main-value"></span></span>
          <input id="main-trim" type="range" min="5" max="95" value="18" step="1" aria-label="Mainsail boom angle">
        </label>

        <label class="control-group" id="jib-wrap">
          <span class="control-title">Jib sheet <span class="value" id="jib-value"></span></span>
          <input id="jib-trim" type="range" min="5" max="100" value="22" step="1" aria-label="Jib angle">
        </label>

        <div class="control-group">
          <div class="control-title">Overlay</div>
          <button type="button" class="icon-button" id="pressure-toggle" aria-pressed="true">Pressure tint</button>
          <button type="button" class="icon-button" id="vectors-toggle" aria-pressed="true">Animated wind arrows</button>
          <button type="button" class="icon-button" id="eddies-toggle" aria-pressed="true">Eddy guides</button>
          <button type="button" class="icon-button" id="centreboard-toggle" aria-pressed="true">Centreboard position guide</button>
        </div>

        <div class="metric-grid" aria-label="Live sail metrics">
          <div class="metric">
            <span>Point of sail</span>
            <strong id="metric-point"></strong>
          </div>
          <div class="metric">
            <span>Tack</span>
            <strong id="metric-tack"></strong>
          </div>
          <div class="metric">
            <span>Main trim</span>
            <strong id="metric-main"></strong>
          </div>
          <div class="metric">
            <span>Jib trim</span>
            <strong id="metric-jib"></strong>
          </div>
          <div class="metric">
            <span>Drive / heel</span>
            <strong id="metric-force"></strong>
          </div>
        </div>

        <div class="panel-footer">
          <img class="club-logo" src="psc-logo.png" alt="Papercourt Sailing Club">
          <p class="note">Model basis: a thin-airfoil lift estimate drives bound circulation, pressure-side acceleration, wake deflection, stall loss, and separated eddies when a sail is luffing or over-trimmed. It is a teaching model, not a replacement for full Navier-Stokes CFD or class-specific sail trim data.</p>
        </div>
      </section>

      <section class="stage" aria-label="Animated wind flow over a sailing dinghy">
        <canvas id="flow-canvas" aria-label="Animated airflow over dinghy sails"></canvas>
        <div class="wind-label" aria-label="True wind direction">
          <div class="wind-arrow" aria-hidden="true"></div>
          <span>True wind</span>
        </div>
        <div class="legend" aria-label="Flow legend">
          <span class="legend-item"><span class="swatch low"></span>low pressure</span>
          <span class="legend-item"><span class="swatch high"></span>high pressure</span>
          <span class="legend-item"><span class="swatch force"></span>sail force</span>
          <span class="legend-item"><span class="swatch eddy"></span>separated eddy</span>
          <span class="legend-item"><span class="swatch telltale"></span>telltales</span>
        </div>
      </section>
    </main>
  `;

  const canvas = root.querySelector("#flow-canvas");
  const ctx = canvas.getContext("2d");
  const stage = root.querySelector(".stage");
  const boatOne = root.querySelector("#boat-one");
  const boatTwo = root.querySelector("#boat-two");
  const boatTwoToggle = root.querySelector("#boat-two-toggle");
  const rigSingle = root.querySelector("#rig-single");
  const rigTwin = root.querySelector("#rig-twin");
  const headingInput = root.querySelector("#heading");
  const mainInput = root.querySelector("#main-trim");
  const jibInput = root.querySelector("#jib-trim");
  const pressureToggle = root.querySelector("#pressure-toggle");
  const vectorsToggle = root.querySelector("#vectors-toggle");
  const eddiesToggle = root.querySelector("#eddies-toggle");
  const centreboardToggle = root.querySelector("#centreboard-toggle");
  const headingValue = root.querySelector("#heading-value");
  const mainValue = root.querySelector("#main-value");
  const jibValue = root.querySelector("#jib-value");
  const metricPoint = root.querySelector("#metric-point");
  const metricTack = root.querySelector("#metric-tack");
  const metricMain = root.querySelector("#metric-main");
  const metricJib = root.querySelector("#metric-jib");
  const metricForce = root.querySelector("#metric-force");
  const jibWrap = root.querySelector("#jib-wrap");
  const BOARD_GUIDE_IMAGE_SIZE = { width: 661, height: 1017 };
  const boardGuideImage = new Image();
  boardGuideImage.decoding = "async";
  boardGuideImage.addEventListener("load", () => {
    paintBackground();
  });
  boardGuideImage.src = "board-guide-boat.jpg";

  const state = {
    activeBoat: 0,
    secondBoat: false,
    boats: [
      {
        label: "Boat 1",
        rig: "twin",
        headingDeg: Number(headingInput.value),
        mainDeg: Number(mainInput.value),
        jibDeg: Number(jibInput.value),
        tillerDeg: 0,
        x: 0,
        y: 0
      },
      {
        label: "Boat 2",
        rig: "twin",
        headingDeg: -75,
        mainDeg: recommendedTrim(75, "main"),
        jibDeg: recommendedTrim(75, "jib"),
        tillerDeg: 0,
        x: 270,
        y: 0
      }
    ],
    pressure: true,
    vectors: true,
    eddies: true,
    centreboardGuide: true,
    dpr: 1,
    width: 0,
    height: 0,
    zoom: 1,
    center: { x: 0, y: 0 },
    particles: [],
    drag: null,
    lastHeadingDragDeg: null,
    lastSailDragValue: null,
    lastTillerDragDeg: null,
    lastTime: performance.now(),
    reducedMotion: window.matchMedia("(prefers-reduced-motion: reduce)").matches
  };

  const WIND = { x: 0, y: -1 };
  const TAU = Math.PI * 2;
  const NO_GO_DEG = 45;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function smoothstep(edge0, edge1, x) {
    const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  }

  function length(v) {
    return Math.hypot(v.x, v.y);
  }

  function normalize(v) {
    const len = length(v) || 1;
    return { x: v.x / len, y: v.y / len };
  }

  function add(a, b) {
    return { x: a.x + b.x, y: a.y + b.y };
  }

  function sub(a, b) {
    return { x: a.x - b.x, y: a.y - b.y };
  }

  function scale(v, s) {
    return { x: v.x * s, y: v.y * s };
  }

  function dot(a, b) {
    return a.x * b.x + a.y * b.y;
  }

  function cross(a, b) {
    return a.x * b.y - a.y * b.x;
  }

  function rotate(v, angle) {
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    return { x: v.x * c - v.y * s, y: v.x * s + v.y * c };
  }

  function normalLeft(v) {
    return { x: -v.y, y: v.x };
  }

  function toScreen(p) {
    return {
      x: state.center.x + p.x * state.zoom,
      y: state.center.y - p.y * state.zoom
    };
  }

  function screenToWorld(x, y) {
    return {
      x: (x - state.center.x) / state.zoom,
      y: (state.center.y - y) / state.zoom
    };
  }

  function viewBounds() {
    const topLeft = screenToWorld(0, 0);
    const bottomRight = screenToWorld(state.width, state.height);
    return {
      left: topLeft.x,
      right: bottomRight.x,
      top: topLeft.y,
      bottom: bottomRight.y
    };
  }

  function drawWorldLine(a, b) {
    const aa = toScreen(a);
    const bb = toScreen(b);
    ctx.moveTo(aa.x, aa.y);
    ctx.lineTo(bb.x, bb.y);
  }

  function formatDegrees(value) {
    return `${Math.round(value)} deg`;
  }

  function normalizeHeadingDeg(value) {
    let normalized = ((value + 180) % 360 + 360) % 360 - 180;
    if (Math.abs(normalized + 180) < 0.001) normalized = 180;
    return normalized;
  }

  function pointOfSail(absHeading) {
    if (absHeading < NO_GO_DEG) return "No-go zone";
    if (absHeading < 60) return "Close hauled";
    if (absHeading < 75) return "Close reach";
    if (absHeading < 105) return "Beam reach";
    if (absHeading < 150) return "Broad reach";
    return "Run";
  }

  function recommendedDaggerboardDepth(absHeading) {
    // Training guide: sources agree on full board upwind and less board downwind;
    // this value drives the pivot angle while the display stays qualitative.
    const boardPoints = [
      [0, 100],
      [45, 100],
      [60, 92],
      [75, 78],
      [90, 65],
      [120, 48],
      [150, 34],
      [180, 25]
    ];
    return interpolateTrim(absHeading, boardPoints);
  }

  function daggerboardDepthLabel(depth) {
    if (depth >= 92) return "Fully down";
    if (depth <= 30) return "Fully up";
    return "Partially up";
  }

  function interpolateTrim(absHeading, points) {
    if (absHeading <= points[0][0]) return points[0][1];
    for (let i = 1; i < points.length; i += 1) {
      const prev = points[i - 1];
      const next = points[i];
      if (absHeading <= next[0]) {
        const t = (absHeading - prev[0]) / (next[0] - prev[0]);
        return Math.round(lerp(prev[1], next[1], smoothstep(0, 1, t)));
      }
    }
    return points[points.length - 1][1];
  }

  function recommendedTrim(absHeading, sailName) {
    const mainPoints = [
      [0, 7],
      [45, 12],
      [60, 18],
      [75, 32],
      [90, 48],
      [120, 66],
      [145, 82],
      [150, 95],
      [170, 95]
    ];
    const jibPoints = [
      [0, 6],
      [45, 10],
      [60, 16],
      [75, 28],
      [90, 42],
      [120, 60],
      [145, 82],
      [150, 100],
      [170, 100]
    ];
    return interpolateTrim(absHeading, sailName === "main" ? mainPoints : jibPoints);
  }

  function activeBoat() {
    return state.boats[state.activeBoat];
  }

  function syncInputsFromActiveBoat() {
    const boat = activeBoat();
    headingInput.value = boat.headingDeg;
    mainInput.value = boat.mainDeg;
    jibInput.value = boat.jibDeg;
  }

  function updateActiveBoatFromInputs() {
    const boat = activeBoat();
    boat.headingDeg = Number(headingInput.value);
    boat.mainDeg = Number(mainInput.value);
    boat.jibDeg = Number(jibInput.value);
  }

  function setRecommendedTrimForHeading() {
    const absHeading = Math.abs(Number(headingInput.value));
    mainInput.value = recommendedTrim(absHeading, "main");
    jibInput.value = recommendedTrim(absHeading, "jib");
  }

  function setRecommendedTrimForBoat(boat) {
    const absHeading = Math.abs(boat.headingDeg);
    boat.mainDeg = recommendedTrim(absHeading, "main");
    boat.jibDeg = recommendedTrim(absHeading, "jib");
  }

  function signedSideLabel(value) {
    if (Math.abs(value) > 178) return "dead run";
    if (Math.abs(value) < 1) return "head to wind";
    return value > 0 ? "starboard" : "port";
  }

  function updateControls() {
    updateActiveBoatFromInputs();
    const boat = activeBoat();
    headingValue.textContent = `${Math.round(Math.abs(boat.headingDeg))} deg ${signedSideLabel(boat.headingDeg)}`;
    mainValue.textContent = formatDegrees(boat.mainDeg);
    jibValue.textContent = formatDegrees(boat.jibDeg);
    boatOne.setAttribute("aria-pressed", String(state.activeBoat === 0));
    boatTwo.setAttribute("aria-pressed", String(state.activeBoat === 1));
    boatTwo.disabled = !state.secondBoat;
    boatTwoToggle.setAttribute("aria-pressed", String(state.secondBoat));
    boatTwoToggle.textContent = state.secondBoat ? "Remove second boat" : "Add second boat";
    rigSingle.setAttribute("aria-pressed", String(boat.rig === "single"));
    rigTwin.setAttribute("aria-pressed", String(boat.rig === "twin"));
    jibInput.disabled = boat.rig === "single";
    jibWrap.style.opacity = boat.rig === "single" ? "0.45" : "1";
    pressureToggle.setAttribute("aria-pressed", String(state.pressure));
    vectorsToggle.setAttribute("aria-pressed", String(state.vectors));
    eddiesToggle.setAttribute("aria-pressed", String(state.eddies));
    centreboardToggle.setAttribute("aria-pressed", String(state.centreboardGuide));
  }

  function buildRig(boat, boatIndex, displayIndex, boatCount) {
    const w = state.width;
    const h = state.height;
    const boatLength = clamp(Math.min(w, h) * (boatCount > 1 ? 0.36 : 0.43), 190, boatCount > 1 ? 320 : 390);
    const beam = boatLength * 0.36;
    const heading = boat.headingDeg * Math.PI / 180;
    const f = { x: Math.sin(heading), y: Math.cos(heading) };
    const aft = scale(f, -1);
    const starboard = { x: f.y, y: -f.x };
    const windToStarboard = dot(WIND, starboard);
    const tackSign = Math.abs(windToStarboard) < 0.015
      ? (boat.headingDeg >= 0 ? 1 : -1)
      : Math.sign(windToStarboard);
    const lee = scale(starboard, tackSign);
    const center = { x: boat.x, y: boat.y };
    const mast = add(center, scale(f, boatLength * 0.10));
    const bow = add(center, scale(f, boatLength * 0.50));
    const stern = add(center, scale(f, -boatLength * 0.47));
    const absHeading = Math.abs(boat.headingDeg);
    const noGo = absHeading < NO_GO_DEG;
    const downwind = smoothstep(118 * Math.PI / 180, 165 * Math.PI / 180, absHeading * Math.PI / 180);
    const mainAngle = boat.mainDeg * Math.PI / 180;
    const jibAngle = boat.jibDeg * Math.PI / 180;
    const mainDir = normalize(add(scale(aft, Math.cos(mainAngle)), scale(lee, Math.sin(mainAngle))));
    const jibSheetSide = downwind > 0.74 ? scale(lee, -1) : lee;
    const jibDir = normalize(add(scale(aft, Math.cos(jibAngle)), scale(jibSheetSide, Math.sin(jibAngle))));
    const sails = [];

    const mainChord = boatLength * 0.50;
    sails.push(makeSail("main", mast, add(mast, scale(mainDir, mainChord)), lee, boatLength, downwind, absHeading, boat));

    if (boat.rig === "twin") {
      const tack = add(center, scale(f, boatLength * 0.43));
      const jibChord = boatLength * 0.35;
      sails.push(makeSail("jib", tack, add(tack, scale(jibDir, jibChord)), jibSheetSide, boatLength, downwind, absHeading, boat));
    }

    for (const sail of sails) {
      sail.boatIndex = boatIndex;
      sail.boatIsActive = boatIndex === state.activeBoat;
    }

    const tack = noGo
      ? "Head to wind"
      : absHeading >= 150
        ? "Running"
      : (tackSign > 0 ? "Port tack" : "Starboard tack");

    return {
      label: boat.label,
      boatIndex,
      displayIndex,
      isActive: boatIndex === state.activeBoat,
      headingDeg: boat.headingDeg,
      rigName: boat.rig,
      boatLength,
      beam,
      f,
      aft,
      starboard,
      lee,
      center,
      mast,
      bow,
      stern,
      tackSign,
      tack,
      noGo,
      downwind,
      tillerDeg: boat.tillerDeg || 0,
      sails
    };
  }

  function buildScene() {
    const boatIndexes = state.secondBoat ? [0, 1] : [0];
    const boats = boatIndexes.map((boatIndex, displayIndex) => (
      buildRig(state.boats[boatIndex], boatIndex, displayIndex, boatIndexes.length)
    ));
    const activeRig = boats.find((boat) => boat.boatIndex === state.activeBoat) || boats[0];
    return {
      boats,
      activeRig,
      sails: boats.flatMap((boat) => boat.sails)
    };
  }

  function makeSail(name, a, b, lee, boatLength, downwind, absHeading, boat) {
    const chordVector = sub(b, a);
    const chord = length(chordVector);
    const tangent = normalize(chordVector);
    let normal = normalLeft(tangent);
    if (dot(normal, lee) < 0) normal = scale(normal, -1);

    const windAlong = dot(WIND, tangent);
    const windAcross = dot(WIND, normal);
    let rawAlpha = Math.atan2(windAcross, windAlong || 0.0001);
    if (rawAlpha > Math.PI / 2) rawAlpha -= Math.PI;
    if (rawAlpha < -Math.PI / 2) rawAlpha += Math.PI;
    const control = name === "main" ? boat.mainDeg : boat.jibDeg;
    const targetTrim = recommendedTrim(absHeading, name);
    const trimError = control - targetTrim;
    const noGoLuff = 1 - smoothstep(NO_GO_DEG - 4, NO_GO_DEG + 1, absHeading);
    const tooFarOut = smoothstep(5, 20, trimError);
    const tooFarIn = smoothstep(5, 20, -trimError);
    const luff = Math.max(noGoLuff, tooFarOut);
    const stallLoss = tooFarIn;
    const stall = 1 - stallLoss;
    const sign = Math.sign(rawAlpha || 1);
    const idealAlpha = (9 + smoothstep(0, 20, -trimError) * 8 - smoothstep(0, 20, trimError) * 5) * Math.PI / 180;
    const alpha = sign * clamp(idealAlpha, 3 * Math.PI / 180, 20 * Math.PI / 180);
    const liftCoefficient = 2 * Math.PI * alpha * stall;
    const circulation = liftCoefficient * chord * 16 * (1 - luff * 0.65) * (1 - downwind * 0.40);
    const force = Math.sin(clamp(Math.abs(alpha), 0, Math.PI / 2)) * chord * stall * (1 - luff * 0.65) / boatLength;
    const eddySeverity = Math.max(stallLoss, luff * 0.72);

    return {
      name,
      a,
      b,
      chord,
      tangent,
      normal,
      sheetSide: lee,
      alpha,
      rawAlpha,
      luff,
      stall,
      stallLoss,
      eddySeverity,
      trimError,
      targetTrim,
      windwardTelltaleBreak: luff > 0.35,
      leewardTelltaleBreak: stallLoss > 0.35,
      downwind,
      liftCoefficient,
      circulation,
      force,
      control
    };
  }

  function flowAt(p, rig) {
    const baseSpeed = state.reducedMotion ? 42 : 76;
    let v = { x: 0, y: -baseSpeed };

    for (const sail of rig.sails) {
      const rel = sub(p, sail.a);
      const x = dot(rel, sail.tangent);
      const y = dot(rel, sail.normal);
      const c = sail.chord;
      const along01 = x / c;
      const span = smoothstep(-0.18, 0.12, along01) * (1 - smoothstep(1.05, 1.30, along01));
      const near = Math.exp(-Math.pow(Math.abs(y) / (c * 0.24), 2)) * span;
      const skin = Math.exp(-Math.pow(Math.abs(y) / (c * 0.08), 2)) * smoothstep(-0.04, 0.12, along01) * (1 - smoothstep(0.92, 1.08, along01));
      const side = y >= 0 ? 1 : -1;
      const liftSign = Math.sign(sail.alpha || 1);
      const usableLift = Math.min(1.25, Math.abs(sail.liftCoefficient) / 2.8) * attachedFlowFactor(sail);

      const targetAlong = dot(v, sail.tangent);
      v.x += sail.tangent.x * (baseSpeed * 1.05 - targetAlong) * skin * 0.28;
      v.y += sail.tangent.y * (baseSpeed * 1.05 - targetAlong) * skin * 0.28;

      const lowPressureSide = side * liftSign > 0;
      const pressureBoost = near * usableLift * (lowPressureSide ? 0.38 : -0.18);
      v.x += sail.tangent.x * baseSpeed * pressureBoost;
      v.y += sail.tangent.y * baseSpeed * pressureBoost;

      const bend = near * baseSpeed * 0.18 * liftSign * sail.stall;
      v.x += sail.normal.x * bend;
      v.y += sail.normal.y * bend;

      if (sail.downwind > 0.04) {
        const plate = sail.downwind
          * Math.exp(-Math.pow((x - c * 0.50) / (c * 0.58), 2))
          * Math.exp(-Math.pow(y / (c * 0.20), 2))
          * smoothstep(-0.08, 0.08, along01)
          * (1 - smoothstep(0.92, 1.12, along01));
        v.x -= WIND.x * baseSpeed * 0.48 * plate;
        v.y -= WIND.y * baseSpeed * 0.48 * plate;
        const spillSide = y >= 0 ? 1 : -1;
        v.x += sail.normal.x * spillSide * baseSpeed * 0.26 * plate;
        v.y += sail.normal.y * spillSide * baseSpeed * 0.26 * plate;

        const sailCenter = add(sail.a, scale(sail.tangent, c * 0.50));
        const wakeRel = sub(p, sailCenter);
        const wakeDown = dot(wakeRel, WIND);
        const wakeAcross = dot(wakeRel, sail.tangent);
        if (wakeDown > 0 && wakeDown < c * 1.7) {
          const shadowWidth = c * (0.32 + wakeDown / c * 0.22);
          const shadow = sail.downwind
            * Math.exp(-Math.pow(wakeAcross / shadowWidth, 2))
            * smoothstep(0, c * 0.18, wakeDown)
            * (1 - smoothstep(c * 1.05, c * 1.70, wakeDown));
          v.x -= WIND.x * baseSpeed * 0.30 * shadow;
          v.y -= WIND.y * baseSpeed * 0.30 * shadow;
          v.x += sail.normal.x * Math.sin(wakeDown / c * Math.PI * 3) * baseSpeed * 0.10 * shadow;
          v.y += sail.normal.y * Math.sin(wakeDown / c * Math.PI * 3) * baseSpeed * 0.10 * shadow;
        }
      }

      const quarter = add(sail.a, scale(sail.tangent, c * 0.28));
      const threeQuarter = add(sail.a, scale(sail.tangent, c * 0.78));
      addVortexVelocity(v, p, quarter, -sail.circulation * 0.045, c * 0.18);
      addVortexVelocity(v, p, threeQuarter, sail.circulation * 0.022, c * 0.25);

      const wakeX = x - c;
      if (wakeX > 0 && wakeX < c * 1.35) {
        const wakeWidth = c * (0.12 + 0.22 * wakeX / c);
        const wake = Math.exp(-Math.pow(Math.abs(y - liftSign * wakeX * 0.08) / wakeWidth, 2)) * (1 - wakeX / (c * 1.35));
        v.x += sail.normal.x * baseSpeed * 0.33 * liftSign * wake;
        v.y += sail.normal.y * baseSpeed * 0.33 * liftSign * wake;
        v.x -= sail.tangent.x * baseSpeed * 0.10 * (1 - sail.stall) * wake;
        v.y -= sail.tangent.y * baseSpeed * 0.10 * (1 - sail.stall) * wake;
      }

      if (sail.stallLoss > 0.04) {
        const primary = add(add(sail.a, scale(sail.tangent, c * (0.68 + sail.stallLoss * 0.18))), scale(sail.normal, liftSign * c * (0.18 + sail.stallLoss * 0.20)));
        const trailing = add(add(sail.a, scale(sail.tangent, c * (1.02 + sail.stallLoss * 0.20))), scale(sail.normal, liftSign * c * (0.22 + sail.stallLoss * 0.18)));
        const gamma = baseSpeed * c * sail.stallLoss * (0.95 + sail.stallLoss * 0.65);
        addVortexVelocity(v, p, primary, liftSign * gamma, c * (0.13 + sail.stallLoss * 0.16));
        addVortexVelocity(v, p, trailing, -liftSign * gamma * 0.72, c * (0.17 + sail.stallLoss * 0.22));

        const bubbleRadius = c * (0.27 + sail.stallLoss * 0.20);
        const bubbleRel = sub(p, primary);
        const bubble = Math.exp(-(bubbleRel.x * bubbleRel.x + bubbleRel.y * bubbleRel.y) / (bubbleRadius * bubbleRadius));
        v.x -= sail.tangent.x * baseSpeed * 0.42 * sail.stallLoss * bubble;
        v.y -= sail.tangent.y * baseSpeed * 0.42 * sail.stallLoss * bubble;
      }

      if (sail.luff > 0.12) {
        const flutter = sail.luff * sail.luff;
        const upper = add(add(sail.a, scale(sail.tangent, c * 0.46)), scale(sail.normal, c * 0.16));
        const lower = add(add(sail.a, scale(sail.tangent, c * 0.70)), scale(sail.normal, -c * 0.16));
        const gamma = baseSpeed * c * 0.48 * flutter;
        addVortexVelocity(v, p, upper, liftSign * gamma, c * 0.17);
        addVortexVelocity(v, p, lower, -liftSign * gamma, c * 0.17);

        const relUpper = sub(p, upper);
        const relLower = sub(p, lower);
        const upperBubble = Math.exp(-(relUpper.x * relUpper.x + relUpper.y * relUpper.y) / (c * c * 0.11));
        const lowerBubble = Math.exp(-(relLower.x * relLower.x + relLower.y * relLower.y) / (c * c * 0.11));
        v.x -= sail.tangent.x * baseSpeed * 0.24 * flutter * (upperBubble + lowerBubble);
        v.y -= sail.tangent.y * baseSpeed * 0.24 * flutter * (upperBubble + lowerBubble);
      }

      if (Math.abs(y) < 6 && x > 0 && x < c) {
        const push = (6 - Math.abs(y)) * 15 * (y >= 0 ? 1 : -1);
        v.x += sail.normal.x * push;
        v.y += sail.normal.y * push;
      }
    }

    const hulls = rig.boats || [rig];
    for (const hull of hulls) {
      const hullRel = sub(p, hull.center);
      const hx = dot(hullRel, hull.f);
      const hy = dot(hullRel, hull.starboard);
      const hullLen = hull.boatLength * 0.52;
      const hullBeam = hull.beam * 0.64;
      const hullInfluence = Math.exp(-Math.pow(hx / hullLen, 2) - Math.pow(hy / hullBeam, 2));
      if (hullInfluence > 0.025) {
        const side = hy >= 0 ? 1 : -1;
        v.x += hull.starboard.x * side * hullInfluence * 34;
        v.y += hull.starboard.y * side * hullInfluence * 34;
        v.x += hull.f.x * hullInfluence * 8;
        v.y += hull.f.y * hullInfluence * 8;
      }
    }

    const speed = length(v);
    if (speed > 165) {
      v = scale(v, 165 / speed);
    }
    return v;
  }

  function addVortexVelocity(v, p, q, gamma, core) {
    const dx = p.x - q.x;
    const dy = p.y - q.y;
    const r2 = dx * dx + dy * dy + core * core;
    const factor = gamma / (TAU * r2);
    v.x += -dy * factor;
    v.y += dx * factor;
  }

  function resetParticle(p, randomY) {
    const bounds = viewBounds();
    const margin = 36 / state.zoom;
    p.x = bounds.left + margin + Math.random() * Math.max(20, bounds.right - bounds.left - margin * 2);
    p.y = randomY
      ? lerp(bounds.bottom - 40 / state.zoom, bounds.top + 60 / state.zoom, Math.random())
      : bounds.top + Math.random() * 60 / state.zoom;
    p.px = p.x;
    p.py = p.y;
    p.age = Math.random() * 120;
    p.life = 170 + Math.random() * 170;
    p.speedHue = Math.random();
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    state.dpr = Math.min(window.devicePixelRatio || 1, 2);
    state.width = Math.max(320, rect.width);
    state.height = Math.max(420, rect.height);
    state.center.x = state.width * 0.52;
    state.center.y = state.height * 0.53;
    canvas.width = Math.round(state.width * state.dpr);
    canvas.height = Math.round(state.height * state.dpr);
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    const targetCount = state.reducedMotion ? 120 : Math.round(clamp(state.width * state.height / 3900, 150, 310));
    state.particles = Array.from({ length: targetCount }, () => {
      const p = {};
      resetParticle(p, true);
      return p;
    });
    paintBackground();
  }

  function paintBackground() {
    ctx.clearRect(0, 0, state.width, state.height);
    const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
    gradient.addColorStop(0, "#d8e9e4");
    gradient.addColorStop(1, "#edf4ed");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, state.width, state.height);

    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.strokeStyle = "#9eb4ad";
    ctx.lineWidth = 1;
    const spacing = 42;
    for (let x = -spacing; x < state.width + spacing; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, state.height);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawNoGoZone(rig) {
    const headingDistance = Math.abs(Math.abs(rig.headingDeg) - NO_GO_DEG);
    if (!rig.noGo && headingDistance > 5) return;

    const radius = Math.hypot(state.width, state.height) * 1.05;
    const center = toScreen(rig.center);
    const start = -Math.PI / 2 - NO_GO_DEG * Math.PI / 180;
    const end = -Math.PI / 2 + NO_GO_DEG * Math.PI / 180;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(center.x, center.y);
    ctx.arc(center.x, center.y, radius, start, end, false);
    ctx.closePath();
    ctx.fillStyle = rig.noGo ? "rgba(216, 72, 52, 0.20)" : "rgba(79, 93, 86, 0.045)";
    ctx.fill();

    ctx.strokeStyle = rig.noGo ? "rgba(180, 42, 36, 0.70)" : "rgba(79, 93, 86, 0.32)";
    ctx.lineWidth = rig.noGo ? 2.2 : 1.4;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    const left = {
      x: center.x + Math.cos(start) * radius,
      y: center.y + Math.sin(start) * radius
    };
    const right = {
      x: center.x + Math.cos(end) * radius,
      y: center.y + Math.sin(end) * radius
    };
    ctx.moveTo(center.x, center.y);
    ctx.lineTo(left.x, left.y);
    ctx.moveTo(center.x, center.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = "500 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const label = "NO-GO ZONE";
    const labelY = Math.max(36, center.y - Math.min(radius * 0.44, state.height * 0.44));
    const width = ctx.measureText(label).width + 18;
    ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
    ctx.strokeStyle = rig.noGo ? "rgba(180, 42, 36, 0.42)" : "rgba(79, 93, 86, 0.24)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(center.x - width / 2, labelY - 12, width, 24, 7);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = rig.noGo ? "#b42a24" : "rgba(79, 93, 86, 0.62)";
    ctx.fillText(label, center.x, labelY + 0.5);
    ctx.restore();
  }

  function drawPressure(rig) {
    if (!state.pressure) return;
    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    for (const sail of rig.sails) {
      const lift = Math.min(1, Math.abs(sail.liftCoefficient) / 2.8) * attachedFlowFactor(sail);
      const liftSign = Math.sign(sail.alpha || 1);
      const lowA = toScreen(add(add(sail.a, scale(sail.tangent, sail.chord * 0.44)), scale(sail.normal, sail.chord * 0.12 * liftSign)));
      const highA = toScreen(add(add(sail.a, scale(sail.tangent, sail.chord * 0.38)), scale(sail.normal, -sail.chord * 0.12 * liftSign)));
      const radius = sail.chord * state.zoom * 0.52;

      let g = ctx.createRadialGradient(lowA.x, lowA.y, 2, lowA.x, lowA.y, radius);
      g.addColorStop(0, `rgba(67, 119, 196, ${0.44 * lift})`);
      g.addColorStop(0.46, `rgba(67, 119, 196, ${0.20 * lift})`);
      g.addColorStop(1, "rgba(67, 119, 196, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(lowA.x, lowA.y, radius, 0, TAU);
      ctx.fill();

      g = ctx.createRadialGradient(highA.x, highA.y, 2, highA.x, highA.y, radius * 0.98);
      g.addColorStop(0, `rgba(216, 111, 52, ${0.52 * lift})`);
      g.addColorStop(0.46, `rgba(216, 111, 52, ${0.26 * lift})`);
      g.addColorStop(1, "rgba(216, 111, 52, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(highA.x, highA.y, radius * 0.98, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawVectors(rig, now) {
    if (!state.vectors) return;
    const spacing = state.width < 580 ? 46 : 58;
    const arrowSpacing = state.width < 580 ? 76 : 92;
    const bounds = viewBounds();
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (let sx = spacing * 0.5, lane = 0; sx < state.width + spacing * 0.8; sx += spacing, lane += 1) {
      const seed = screenToWorld(sx, -50);
      const points = traceFlowLine(seed, rig, bounds);
      if (points.length < 4) continue;

      ctx.beginPath();
      for (let i = 0; i < points.length; i += 1) {
        const s = toScreen(points[i]);
        if (i === 0) ctx.moveTo(s.x, s.y);
        else ctx.lineTo(s.x, s.y);
      }
      ctx.strokeStyle = "rgba(8, 127, 122, 0.18)";
      ctx.lineWidth = 1.2;
      ctx.stroke();

      let total = 0;
      const segments = [];
      for (let i = 1; i < points.length; i += 1) {
        const a = points[i - 1];
        const b = points[i];
        const segmentLength = length(sub(b, a));
        total += segmentLength;
        segments.push({ a, b, start: total - segmentLength, length: segmentLength });
      }

      const travel = (now * 0.105 + lane * 23) % arrowSpacing;
      for (let d = travel; d < total; d += arrowSpacing) {
        const segment = segments.find((entry) => d >= entry.start && d <= entry.start + entry.length);
        if (!segment || segment.length < 1) continue;
        const t = (d - segment.start) / segment.length;
        const p = {
          x: lerp(segment.a.x, segment.b.x, t),
          y: lerp(segment.a.y, segment.b.y, t)
        };
        const dir = normalize(sub(segment.b, segment.a));
        const localSpeed = length(flowAt(p, rig));
        const warm = clamp((localSpeed - 78) / 70, 0, 1);
        const alpha = clamp(0.34 + localSpeed / 260, 0.34, 0.82);
        const color = `rgba(${Math.round(8 + warm * 208)}, ${Math.round(127 - warm * 16)}, ${Math.round(122 - warm * 70)}, ${alpha})`;
        drawFlowArrow(p, dir, 22 + warm * 7, color, 1.6 + warm * 0.7);
      }
    }
    ctx.restore();
  }

  function traceFlowLine(seed, rig, bounds) {
    const points = [];
    let p = { x: seed.x, y: seed.y };
    const step = (state.width < 580 ? 12 : 14) / state.zoom;
    const maxSteps = Math.round((state.width < 580 ? 88 : 106) * clamp(state.zoom, 1, 2.2));
    const margin = 80 / state.zoom;
    for (let i = 0; i < maxSteps; i += 1) {
      if (
        p.x < bounds.left - margin ||
        p.x > bounds.right + margin ||
        p.y < bounds.bottom - margin ||
        p.y > bounds.top + margin
      ) {
        break;
      }
      points.push({ x: p.x, y: p.y });
      const v1 = flowAt(p, rig);
      const dt = step / Math.max(24, length(v1));
      const mid = {
        x: p.x + v1.x * dt * 0.5,
        y: p.y + v1.y * dt * 0.5
      };
      const v2 = flowAt(mid, rig);
      p = {
        x: p.x + v2.x * dt,
        y: p.y + v2.y * dt
      };
    }
    return points;
  }

  function drawFlowArrow(centerWorld, dirWorld, size, color, width) {
    const worldSize = size / state.zoom;
    const start = toScreen(add(centerWorld, scale(dirWorld, -worldSize * 0.46)));
    const end = toScreen(add(centerWorld, scale(dirWorld, worldSize * 0.54)));
    const angle = Math.atan2(end.y - start.y, end.x - start.x);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(end.x, end.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(end.x, end.y);
    ctx.lineTo(end.x - Math.cos(angle - 0.52) * 8, end.y - Math.sin(angle - 0.52) * 8);
    ctx.lineTo(end.x - Math.cos(angle + 0.52) * 8, end.y - Math.sin(angle + 0.52) * 8);
    ctx.closePath();
    ctx.fill();
  }

  function drawEddyGuides(rig, now) {
    if (!state.eddies) return;
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (const sail of rig.sails) {
      const liftSign = Math.sign(sail.alpha || 1);
      if (sail.stallLoss > 0.06) {
        const severity = clamp(sail.stallLoss, 0, 1);
        const center = add(
          add(sail.a, scale(sail.tangent, sail.chord * (0.72 + severity * 0.16))),
          scale(sail.normal, liftSign * sail.chord * (0.20 + severity * 0.18))
        );
        drawEddySpiral(center, sail.chord * (0.16 + severity * 0.22), liftSign, severity, now, sail.downwind > 0.55 ? "spill" : "separation");

        const shed = add(
          add(sail.a, scale(sail.tangent, sail.chord * (1.04 + severity * 0.18))),
          scale(sail.normal, liftSign * sail.chord * (0.24 + severity * 0.16))
        );
        drawEddySpiral(shed, sail.chord * (0.12 + severity * 0.17), -liftSign, severity * 0.78, now + 480, "");
      }

      if (sail.luff > 0.14) {
        const severity = clamp(sail.luff, 0, 1);
        const upper = add(add(sail.a, scale(sail.tangent, sail.chord * 0.45)), scale(sail.normal, sail.chord * 0.18));
        const lower = add(add(sail.a, scale(sail.tangent, sail.chord * 0.68)), scale(sail.normal, -sail.chord * 0.18));
        drawEddySpiral(upper, sail.chord * (0.12 + severity * 0.12), liftSign, severity * 0.82, now + 220, "luff");
        drawEddySpiral(lower, sail.chord * (0.10 + severity * 0.10), -liftSign, severity * 0.66, now + 700, "");
      }
    }
    ctx.restore();
  }

  function drawEddySpiral(centerWorld, radius, spin, severity, now, label) {
    const center = toScreen(centerWorld);
    const screenRadius = radius * state.zoom;
    const turns = 1.7;
    const steps = 46;
    const phase = (now / 620) % TAU;
    ctx.globalAlpha = clamp(0.18 + severity * 0.50, 0.18, 0.72);
    ctx.strokeStyle = "#d86f34";
    ctx.fillStyle = "#d86f34";
    ctx.lineWidth = 1.4 + severity * 1.4;
    ctx.setLineDash([7, 7]);
    ctx.lineDashOffset = -now / 36;
    ctx.beginPath();
    for (let i = 0; i <= steps; i += 1) {
      const t = i / steps;
      const angle = spin * (phase + t * TAU * turns);
      const r = screenRadius * (0.18 + t * 0.82);
      const x = center.x + Math.cos(angle) * r;
      const y = center.y - Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    const arrowAngle = spin * (phase + TAU * turns);
    const tip = {
      x: center.x + Math.cos(arrowAngle) * screenRadius,
      y: center.y - Math.sin(arrowAngle) * screenRadius
    };
    const tangent = arrowAngle + spin * Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(tip.x - Math.cos(tangent - 0.52) * 8, tip.y + Math.sin(tangent - 0.52) * 8);
    ctx.lineTo(tip.x - Math.cos(tangent + 0.52) * 8, tip.y + Math.sin(tangent + 0.52) * 8);
    ctx.closePath();
    ctx.fill();

    if (label && severity > 0.30) {
      ctx.globalAlpha = clamp(0.34 + severity * 0.42, 0.34, 0.76);
      ctx.font = "500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
      ctx.fillText(label, center.x + screenRadius * 0.72, center.y - screenRadius * 0.72);
    }
  }

  function drawParticles(rig, dt) {
    const bounds = viewBounds();
    const margin = 80 / state.zoom;
    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.lineCap = "round";
    for (const p of state.particles) {
      p.px = p.x;
      p.py = p.y;
      const v1 = flowAt(p, rig);
      const mid = {
        x: p.x + v1.x * dt * 0.5,
        y: p.y + v1.y * dt * 0.5
      };
      const v2 = flowAt(mid, rig);
      p.x += v2.x * dt;
      p.y += v2.y * dt;
      p.age += dt * 60;

      const speed = length(v2);
      const alpha = clamp(0.18 + speed / 420, 0.18, 0.56);
      const warm = clamp((speed - 82) / 62, 0, 1);
      const r = Math.round(lerp(8, 216, warm));
      const g = Math.round(lerp(127, 111, warm));
      const b = Math.round(lerp(122, 52, warm));
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      ctx.lineWidth = clamp(speed / 58, 1.1, 2.6);
      ctx.beginPath();
      drawWorldLine({ x: p.px, y: p.py }, { x: p.x, y: p.y });
      ctx.stroke();

      if (
        p.y < bounds.bottom - margin ||
        p.x < bounds.left - margin ||
        p.x > bounds.right + margin ||
        p.age > p.life
      ) {
        resetParticle(p, false);
      }
    }
    ctx.restore();
  }

  function drawBoat(rig) {
    const f = rig.f;
    const sb = rig.starboard;
    const L = rig.boatLength;
    const beam = rig.beam;
    const bow = toScreen(add(rig.center, scale(f, L * 0.55)));
    const starShoulder = toScreen(add(add(rig.center, scale(f, L * 0.34)), scale(sb, beam * 0.52)));
    const starWide = toScreen(add(add(rig.center, scale(f, -L * 0.06)), scale(sb, beam * 0.64)));
    const starTransom = toScreen(add(add(rig.center, scale(f, -L * 0.46)), scale(sb, beam * 0.50)));
    const portTransom = toScreen(add(add(rig.center, scale(f, -L * 0.46)), scale(sb, -beam * 0.50)));
    const portWide = toScreen(add(add(rig.center, scale(f, -L * 0.06)), scale(sb, -beam * 0.64)));
    const portShoulder = toScreen(add(add(rig.center, scale(f, L * 0.34)), scale(sb, -beam * 0.52)));

    ctx.save();
    ctx.globalAlpha = rig.isActive ? 1 : 0.76;
    ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(bow.x, bow.y);
    ctx.bezierCurveTo(starShoulder.x, starShoulder.y, starWide.x, starWide.y, starTransom.x, starTransom.y);
    ctx.lineTo(portTransom.x, portTransom.y);
    ctx.bezierCurveTo(portWide.x, portWide.y, portShoulder.x, portShoulder.y, bow.x, bow.y);
    ctx.closePath();
    ctx.fillStyle = rig.noGo ? "#f2b3ab" : "#f7faf5";
    ctx.strokeStyle = rig.noGo ? "#b42a24" : (rig.isActive ? "#087f7a" : "#4f5d56");
    ctx.lineWidth = rig.isActive ? 3 : 2;
    ctx.shadowColor = "rgba(22, 36, 30, 0.18)";
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 8;
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.stroke();

    const innerBow = toScreen(add(rig.center, scale(f, L * 0.40)));
    const innerStarMid = toScreen(add(add(rig.center, scale(f, -L * 0.04)), scale(sb, beam * 0.43)));
    const innerStarAft = toScreen(add(add(rig.center, scale(f, -L * 0.38)), scale(sb, beam * 0.32)));
    const innerPortAft = toScreen(add(add(rig.center, scale(f, -L * 0.38)), scale(sb, -beam * 0.32)));
    const innerPortMid = toScreen(add(add(rig.center, scale(f, -L * 0.04)), scale(sb, -beam * 0.43)));

    ctx.beginPath();
    ctx.moveTo(innerBow.x, innerBow.y);
    ctx.bezierCurveTo(innerStarMid.x, innerStarMid.y, innerStarMid.x, innerStarMid.y, innerStarAft.x, innerStarAft.y);
    ctx.lineTo(innerPortAft.x, innerPortAft.y);
    ctx.bezierCurveTo(innerPortMid.x, innerPortMid.y, innerPortMid.x, innerPortMid.y, innerBow.x, innerBow.y);
    ctx.closePath();
    ctx.fillStyle = rig.noGo ? "#f7d4d0" : "#e7eee8";
    ctx.strokeStyle = rig.noGo ? "rgba(180, 42, 36, 0.58)" : "rgba(79, 93, 86, 0.44)";
    ctx.lineWidth = 1.4;
    ctx.fill();
    ctx.stroke();

    if (rig.noGo) {
      const warning = toScreen(add(rig.center, scale(f, L * 0.58)));
      ctx.font = "500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const text = "NO-GO";
      const width = ctx.measureText(text).width + 12;
      ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
      ctx.strokeStyle = "rgba(180, 42, 36, 0.55)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(warning.x - width / 2, warning.y - 10, width, 20, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#b42a24";
      ctx.fillText(text, warning.x, warning.y + 0.5);
    }

    const badge = toScreen(add(rig.center, scale(f, -L * 0.66)));
    const badgeText = rig.label.toUpperCase();
    ctx.font = "500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const badgeWidth = ctx.measureText(badgeText).width + 16;
    ctx.fillStyle = rig.isActive ? "rgba(8, 127, 122, 0.88)" : "rgba(79, 93, 86, 0.72)";
    ctx.strokeStyle = "rgba(255, 255, 255, 0.82)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(badge.x - badgeWidth / 2, badge.y - 11, badgeWidth, 22, 7);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#ffffff";
    ctx.fillText(badgeText, badge.x, badge.y + 0.5);

    ctx.beginPath();
    drawWorldLine(add(add(rig.center, scale(f, L * 0.36)), scale(sb, beam * 0.38)), add(add(rig.center, scale(f, -L * 0.35)), scale(sb, beam * 0.30)));
    drawWorldLine(add(add(rig.center, scale(f, L * 0.36)), scale(sb, -beam * 0.38)), add(add(rig.center, scale(f, -L * 0.35)), scale(sb, -beam * 0.30)));
    ctx.strokeStyle = "rgba(79, 93, 86, 0.28)";
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.beginPath();
    drawWorldLine(add(add(rig.center, scale(f, -L * 0.10)), scale(sb, beam * 0.42)), add(add(rig.center, scale(f, -L * 0.10)), scale(sb, -beam * 0.42)));
    ctx.strokeStyle = "rgba(79, 93, 86, 0.56)";
    ctx.lineWidth = 4.5;
    ctx.lineCap = "round";
    ctx.stroke();

    ctx.beginPath();
    drawWorldLine(add(rig.center, scale(f, L * 0.08)), add(rig.center, scale(f, -L * 0.12)));
    ctx.strokeStyle = "rgba(55, 70, 62, 0.62)";
    ctx.lineWidth = 5.5;
    ctx.lineCap = "round";
    ctx.stroke();

    drawTillerRudder(rig);

    drawSideLabel(
      "STARBOARD",
      add(add(rig.center, scale(f, -L * 0.05)), scale(sb, beam * 0.53)),
      add(add(rig.center, scale(f, -L * 0.05)), scale(sb, beam * 0.78)),
      "#087f7a"
    );
    drawSideLabel(
      "PORT",
      add(add(rig.center, scale(f, -L * 0.05)), scale(sb, -beam * 0.53)),
      add(add(rig.center, scale(f, -L * 0.05)), scale(sb, -beam * 0.78)),
      "#d86f34"
    );

    ctx.beginPath();
    const mastScreen = toScreen(rig.mast);
    ctx.arc(mastScreen.x, mastScreen.y, 5, 0, TAU);
    ctx.fillStyle = "#4f5d56";
    ctx.fill();

    for (const sail of rig.sails) {
      drawSail(sail);
    }

    drawForceArrows(rig);
    ctx.restore();
  }

  function boatHandlePoints(rig) {
    return {
      bow: add(rig.center, scale(rig.f, rig.boatLength * 0.53))
    };
  }

  function bowMoveHitAtPoint(rig, p) {
    const bow = boatHandlePoints(rig).bow;
    const rel = sub(p, rig.center);
    const hx = dot(rel, rig.f);
    const hy = Math.abs(dot(rel, rig.starboard));
    const hitRadius = Math.max(24 / state.zoom, rig.boatLength * 0.075);
    return length(sub(p, bow)) <= hitRadius || (hx > rig.boatLength * 0.34 && hy < rig.beam * 0.40);
  }

  function tillerRudderGeometry(rig, overrideDeg = null) {
    const angle = (overrideDeg === null ? rig.tillerDeg : overrideDeg) * Math.PI / 180;
    const stock = add(rig.center, scale(rig.f, -rig.boatLength * 0.49));
    const axis = normalize(add(scale(rig.f, Math.cos(angle)), scale(rig.starboard, Math.sin(angle))));
    const side = normalLeft(axis);
    const forwardTip = add(stock, scale(axis, rig.boatLength * 0.25));
    const aftTip = add(stock, scale(axis, -rig.boatLength * 0.17));
    const halfWidth = rig.beam * 0.038;

    return {
      stock,
      axis,
      forwardTip,
      aftTip,
      rectangle: [
        add(forwardTip, scale(side, halfWidth)),
        add(aftTip, scale(side, halfWidth * 0.82)),
        add(aftTip, scale(side, -halfWidth * 0.82)),
        add(forwardTip, scale(side, -halfWidth))
      ]
    };
  }

  function drawTillerRudder(rig) {
    const geometry = tillerRudderGeometry(rig);
    const points = geometry.rectangle.map(toScreen);
    const stock = toScreen(geometry.stock);

    ctx.save();
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i += 1) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.closePath();
    ctx.fillStyle = rig.isActive ? "rgba(8, 127, 122, 0.24)" : "rgba(79, 93, 86, 0.18)";
    ctx.strokeStyle = rig.isActive ? "rgba(8, 127, 122, 0.86)" : "rgba(79, 93, 86, 0.62)";
    ctx.lineWidth = rig.isActive ? 2 : 1.4;
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(stock.x, stock.y, clamp(rig.boatLength * 0.013, 3.2, 5), 0, TAU);
    ctx.fillStyle = "rgba(55, 70, 62, 0.90)";
    ctx.fill();
    ctx.restore();
  }

  function drawSideLabel(text, anchorWorld, labelWorld, color) {
    const anchor = toScreen(anchorWorld);
    const label = toScreen(labelWorld);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.82;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(anchor.x, anchor.y);
    ctx.lineTo(label.x, label.y);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.font = "500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const width = ctx.measureText(text).width + 12;
    ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
    ctx.strokeStyle = "rgba(79, 93, 86, 0.30)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(label.x - width / 2, label.y - 10, width, 20, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.fillText(text, label.x, label.y + 0.5);
    ctx.restore();
  }

  function drawSailSurfaceFlow(rig, now) {
    if (!state.vectors) return;
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (const sail of rig.sails) {
      const liftSign = Math.sign(sail.alpha || 1);
      const flowSides = [
        { side: liftSign, color: "rgba(8, 127, 122, 0.78)", width: 2.2, offset: 0.090 },
        { side: -liftSign, color: "rgba(216, 111, 52, 0.62)", width: 1.7, offset: 0.070 }
      ];

      for (const flowSide of flowSides) {
        ctx.beginPath();
        for (let i = 0; i <= 28; i += 1) {
          const t = 0.04 + i * 0.92 / 28;
          const p = sailSurfacePoint(sail, t, flowSide.side * flowSide.offset);
          const s = toScreen(p);
          if (i === 0) ctx.moveTo(s.x, s.y);
          else ctx.lineTo(s.x, s.y);
        }
        ctx.strokeStyle = flowSide.color;
        ctx.lineWidth = flowSide.width;
        if (sail.stallLoss > 0.35 || sail.luff > 0.45) {
          ctx.setLineDash([8, 8]);
          ctx.lineDashOffset = -now / 42;
        }
        ctx.stroke();
        ctx.setLineDash([]);

        const speedFactor = flowSide.side === liftSign ? 0.00034 : 0.00024;
        const phase = (now * speedFactor + (sail.name === "jib" ? 0.17 : 0)) % 1;
        for (let i = 0; i < 3; i += 1) {
          const t = 0.11 + ((phase + i * 0.31) % 0.80);
          const p = sailSurfacePoint(sail, t, flowSide.side * flowSide.offset);
          const p2 = sailSurfacePoint(sail, Math.min(0.98, t + 0.035), flowSide.side * flowSide.offset);
          drawFlowArrow(p, normalize(sub(p2, p)), 19, flowSide.color, flowSide.width);
        }
      }
    }
    ctx.restore();
  }

  function sailSurfacePoint(sail, t, sideOffset) {
    return add(
      add(sail.a, scale(sail.tangent, sail.chord * t)),
      scale(sail.normal, sail.chord * (0.055 * Math.sin(Math.PI * t) + sideOffset))
    );
  }

  function attachedFlowFactor(sail) {
    return sail.stall * (1 - sail.luff * 0.65);
  }

  function drawTelltales(rig, now) {
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (const sail of rig.sails) {
      const leewardSide = Math.sign(sail.alpha || 1);
      const telltales = [
        {
          side: leewardSide,
          broken: sail.leewardTelltaleBreak || sail.luff > 0.80,
          color: "rgba(8, 127, 122, 0.92)",
          brokenColor: "rgba(216, 111, 52, 0.92)"
        },
        {
          side: -leewardSide,
          broken: sail.windwardTelltaleBreak,
          color: "rgba(216, 111, 52, 0.88)",
          brokenColor: "rgba(180, 42, 36, 0.94)"
        }
      ];

      for (const item of telltales) {
        [0.16, 0.31, 0.46].forEach((t, index) => {
          drawTelltaleLine(sail, item.side, t, item.broken, item.color, item.brokenColor, now, index);
        });
      }
    }

    ctx.restore();
  }

  function drawTelltaleLine(sail, side, t, broken, color, brokenColor, now, seed) {
    const base = sailSurfacePoint(sail, t, side * 0.118);
    const steps = broken ? 9 : 5;
    const lineLength = sail.chord * (broken ? 0.052 : 0.115);
    const wave = sail.chord * (broken ? 0.033 : 0.006);
    const phase = now / (broken ? 82 : 185) + seed * 1.7 + t * 9;

    ctx.beginPath();
    for (let i = 0; i <= steps; i += 1) {
      const u = i / steps;
      const along = broken
        ? lineLength * (0.24 * u + 0.22 * Math.sin(u * TAU + phase))
        : lineLength * u;
      const flap = Math.sin(phase + u * (broken ? TAU * 1.35 : Math.PI * 0.92));
      const outward = side * wave * flap;
      const p = add(add(base, scale(sail.tangent, along)), scale(sail.normal, outward));
      const s = toScreen(p);
      if (i === 0) ctx.moveTo(s.x, s.y);
      else ctx.lineTo(s.x, s.y);
    }

    ctx.strokeStyle = broken ? brokenColor : color;
    ctx.lineWidth = broken ? 2.2 : 1.8;
    ctx.globalAlpha = broken ? 0.90 : 0.78;
    if (broken) {
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = -now / 50 - seed * 3;
    }
    ctx.stroke();
    ctx.setLineDash([]);

    const root = toScreen(base);
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = broken ? brokenColor : color;
    ctx.beginPath();
    ctx.arc(root.x, root.y, 2.4, 0, TAU);
    ctx.fill();
  }

  function drawSail(sail) {
    const a = toScreen(sail.a);
    const b = toScreen(sail.b);
    const mid = add(add(sail.a, scale(sail.tangent, sail.chord * 0.50)), scale(sail.normal, sail.chord * 0.055));
    const m = toScreen(mid);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(m.x, m.y, b.x, b.y);
    ctx.strokeStyle = "#3f4d46";
    ctx.lineWidth = sail.name === "main" ? 9 : 7;
    ctx.lineCap = "round";
    ctx.stroke();
    ctx.strokeStyle = "#fbfbf8";
    ctx.lineWidth = sail.name === "main" ? 6 : 4.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = "rgba(63, 77, 70, 0.42)";
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 7]);
    ctx.stroke();
    ctx.setLineDash([]);

    if (sail.stallLoss > 0.35 || sail.luff > 0.35) {
      ctx.fillStyle = sail.luff > sail.stallLoss ? "rgba(97, 72, 180, 0.44)" : "rgba(216, 111, 52, 0.48)";
      for (let i = 0; i < 7; i += 1) {
        const t = 0.18 + i * 0.11;
        const side = sail.luff > sail.stallLoss ? (i % 2 === 0 ? 1 : -1) : Math.sign(sail.alpha || 1);
        const center = add(add(sail.a, scale(sail.tangent, sail.chord * t)), scale(sail.normal, side * sail.chord * (0.13 + i * 0.018)));
        const s = toScreen(center);
        ctx.beginPath();
        ctx.arc(s.x, s.y, 2.3 + (i % 3), 0, TAU);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  function trimStatus(sail) {
    if (sail.downwind > 0.75) {
      if (sail.trimError < -8) return `${Math.round(sail.control)} deg, too far in`;
      if (sail.trimError > 8) return `${Math.round(sail.control)} deg, over-eased`;
      return `${Math.round(sail.control)} deg, eased for run`;
    }
    if (sail.windwardTelltaleBreak && sail.leewardTelltaleBreak) return `${Math.round(sail.control)} deg, luffing`;
    if (sail.windwardTelltaleBreak) return `${Math.round(sail.control)} deg, windward break`;
    if (sail.leewardTelltaleBreak) return `${Math.round(sail.control)} deg, leeward break`;
    return `${Math.round(sail.control)} deg, streaming`;
  }

  function drawForceArrows(rig) {
    ctx.save();
    for (const sail of rig.sails) {
      if (sail.downwind > 0.35) {
        const origin = add(sail.a, scale(sail.tangent, sail.chord * 0.48));
        const drive = Math.max(0, dot(WIND, rig.f)) * sail.downwind;
        if (drive > 0.08) {
          drawArrow(origin, add(origin, scale(rig.f, 28 + drive * 42)), "#087f7a", 2.8);
        }
        if (sail.downwind > 0.72) continue;
      }

      const forceScale = clamp(Math.abs(sail.liftCoefficient) * attachedFlowFactor(sail), 0, 2.4);
      if (forceScale < 0.08) continue;
      const origin = add(sail.a, scale(sail.tangent, sail.chord * 0.48));
      const forceDir = scale(sail.normal, Math.sign(sail.alpha || 1));
      const tip = add(origin, scale(forceDir, 26 + forceScale * 23));
      drawArrow(origin, tip, "#6148b4", 2.6);

      const drive = dot(forceDir, rig.f) * forceScale;
      if (drive > 0.06) {
        const driveTip = add(origin, scale(rig.f, 18 + drive * 18));
        drawArrow(add(origin, scale(sail.normal, -8)), add(driveTip, scale(sail.normal, -8)), "#087f7a", 2);
      }
    }
    ctx.restore();
  }

  function drawArrow(aWorld, bWorld, color, width) {
    const a = toScreen(aWorld);
    const b = toScreen(bWorld);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    const angle = Math.atan2(b.y - a.y, b.x - a.x);
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - Math.cos(angle - 0.55) * 10, b.y - Math.sin(angle - 0.55) * 10);
    ctx.lineTo(b.x - Math.cos(angle + 0.55) * 10, b.y - Math.sin(angle + 0.55) * 10);
    ctx.closePath();
    ctx.fill();
  }

  function computePerformance(rig) {
    const drive = rig.sails.reduce((sum, sail) => {
      const sign = Math.sign(sail.alpha || 1);
      const liftDrive = Math.max(0, dot(scale(sail.normal, sign), rig.f)) * Math.abs(sail.liftCoefficient) * attachedFlowFactor(sail);
      const dragDrive = Math.max(0, dot(WIND, rig.f)) * sail.downwind * 1.8;
      return sum + liftDrive + dragDrive;
    }, 0);
    const heel = rig.sails.reduce((sum, sail) => {
      const sign = Math.sign(sail.alpha || 1);
      const liftHeel = Math.abs(dot(scale(sail.normal, sign), rig.starboard)) * Math.abs(sail.liftCoefficient) * attachedFlowFactor(sail);
      const dragHeel = Math.abs(dot(WIND, rig.starboard)) * sail.downwind * 0.35;
      return sum + liftHeel + dragHeel;
    }, 0);

    return {
      drive,
      heel,
      driveValue: Math.round(drive * 10),
      heelValue: Math.round(heel * 10)
    };
  }

  function drawDriveGauge(performance, rig) {
    const value = performance.driveValue;
    const maxValue = 50;
    const amount = clamp(value / maxValue, 0, 1);
    const x = state.width < 520 ? 12 : 18;
    const y = state.width < 520 ? 12 : 18;
    const width = state.width < 520 ? 128 : 150;
    const height = 54;
    const trackX = x + 14;
    const trackY = y + height - 16;
    const trackWidth = width - 28;
    const fillWidth = trackWidth * amount;

    ctx.save();
    ctx.globalAlpha = 0.90;
    ctx.fillStyle = "rgba(255, 255, 255, 0.66)";
    ctx.strokeStyle = "rgba(79, 93, 86, 0.24)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x, y, width, height, 8);
    ctx.fill();
    ctx.stroke();

    ctx.font = "500 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(79, 93, 86, 0.76)";
    ctx.fillText(`${rig.label.toUpperCase()} DRIVE`, x + 14, y + 16);

    ctx.font = "500 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "right";
    ctx.fillStyle = "#18201d";
    ctx.fillText(String(value), x + width - 14, y + 18);

    ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(79, 93, 86, 0.20)";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(trackX, trackY);
    ctx.lineTo(trackX + trackWidth, trackY);
    ctx.stroke();

    ctx.strokeStyle = amount > 0.70 ? "#087f7a" : "rgba(8, 127, 122, 0.82)";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(trackX, trackY);
    ctx.lineTo(trackX + fillWidth, trackY);
    ctx.stroke();

    for (let i = 0; i <= 4; i += 1) {
      const tickX = trackX + trackWidth * i / 4;
      ctx.strokeStyle = "rgba(79, 93, 86, 0.30)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tickX, trackY - 7);
      ctx.lineTo(tickX, trackY + 7);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawDaggerboardProfiles(scene) {
    if (!state.centreboardGuide) return;
    const boats = scene.boats;
    if (!boats.length) return;

    const compact = state.width < 620;
    const margin = compact ? 10 : 18;
    const width = Math.min(state.width - margin * 2, compact ? 270 : 340);
    const x = Math.max(margin, state.width - width - margin);
    const y = compact ? 88 : 92;
    const fullGuideHeight = Math.max(compact ? 440 : 540, state.height - y - margin);
    const availableHeight = Math.max(compact ? 230 : 285, Math.floor(fullGuideHeight * 0.5));
    const rowHeight = Math.floor((availableHeight - 40) / boats.length);
    const height = 30 + boats.length * rowHeight + 10;

    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = "rgba(255, 255, 255, 0.68)";
    ctx.strokeStyle = "rgba(79, 93, 86, 0.25)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x, y, width, height, 8);
    ctx.fill();
    ctx.stroke();

    ctx.font = "500 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.fillStyle = "rgba(79, 93, 86, 0.76)";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText("CENTREBOARD POSITION GUIDE", x + 12, y + 16);

    boats.forEach((boat, index) => {
      drawDaggerboardProfile(boat, x + 10, y + 30 + index * rowHeight, width - 20, rowHeight - 8);
    });
    ctx.restore();
  }

  function drawDaggerboardProfile(rig, x, y, width, height) {
    const absHeading = Math.abs(rig.headingDeg);
    const point = pointOfSail(absHeading);
    const depth = recommendedDaggerboardDepth(absHeading);
    const boardLabel = daggerboardDepthLabel(depth);
    const labelColor = rig.isActive ? "#087f7a" : "rgba(79, 93, 86, 0.86)";
    const imageRatio = BOARD_GUIDE_IMAGE_SIZE.width / BOARD_GUIDE_IMAGE_SIZE.height;
    const imageMaxW = width - 4;
    const imageMaxH = height - 28;
    const imageW = Math.min(imageMaxW, imageMaxH * imageRatio);
    const imageH = imageW / imageRatio;
    const imageX = x + (width - imageW) / 2;
    const imageY = y + 24 + Math.max(0, (imageMaxH - imageH) / 2);
    const sx = imageW / BOARD_GUIDE_IMAGE_SIZE.width;
    const sy = imageH / BOARD_GUIDE_IMAGE_SIZE.height;
    const imgX = (value) => imageX + value * sx;
    const imgY = (value) => imageY + value * sy;
    const pt = (ix, iy) => ({ x: imgX(ix), y: imgY(iy) });

    ctx.save();
    ctx.font = "500 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = labelColor;
    ctx.fillText(`${rig.label}: ${point}`, x, y + 9);

    ctx.textAlign = "right";
    ctx.fillStyle = "rgba(24, 32, 29, 0.84)";
    ctx.fillText(`Board: ${boardLabel}`, x + width, y + 9);

    ctx.save();
    ctx.beginPath();
    ctx.rect(imageX, imageY, imageW, imageH);
    ctx.clip();

    if (boardGuideImage.complete && boardGuideImage.naturalWidth > 0) {
      ctx.drawImage(boardGuideImage, imageX, imageY, imageW, imageH);
    } else {
      ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
      ctx.fillRect(imageX, imageY, imageW, imageH);
    }

    if (rig.rigName === "single") {
      ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
      ctx.beginPath();
      ctx.moveTo(imgX(390), imgY(330));
      ctx.lineTo(imgX(625), imgY(820));
      ctx.lineTo(imgX(420), imgY(820));
      ctx.lineTo(imgX(405), imgY(420));
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
    ctx.fillRect(imgX(292), imgY(850), 112 * sx, 170 * sy);

    ctx.beginPath();
    if (rig.rigName === "twin") {
      const pivot = pt(368, 872);
      const bladeLength = 132 * sx;
      const bladeChord = 44 * sx;
      const downRange = clamp((depth - 30) / 62, 0, 1);
      const boardAngle = (1 - downRange) * 82 * Math.PI / 180;
      const rotateFromPivot = (dx, dy) => ({
        x: pivot.x + dx * Math.cos(boardAngle) - dy * Math.sin(boardAngle),
        y: pivot.y + dx * Math.sin(boardAngle) + dy * Math.cos(boardAngle)
      });
      const aftTop = rotateFromPivot(-bladeChord, 0);
      const aftTip = rotateFromPivot(-bladeChord * 0.86, bladeLength);
      const foreTip = rotateFromPivot(-bladeChord * 0.23, bladeLength + 8 * sx);
      ctx.moveTo(pivot.x, pivot.y);
      ctx.lineTo(aftTop.x, aftTop.y);
      ctx.lineTo(aftTip.x, aftTip.y);
      ctx.quadraticCurveTo(
        (aftTip.x + foreTip.x) / 2,
        Math.max(aftTip.y, foreTip.y) + 4,
        foreTip.x,
        foreTip.y
      );
      ctx.closePath();
    } else {
      const boardVisible = 132 * sy * clamp((depth - 25) / 75, 0, 1);
      if (boardVisible > 4) {
        ctx.moveTo(imgX(324), imgY(872));
        ctx.lineTo(imgX(369), imgY(872));
        ctx.lineTo(imgX(366), imgY(872) + boardVisible * 0.93);
        ctx.quadraticCurveTo(imgX(350), imgY(872) + boardVisible + 8 * sy, imgX(326), imgY(872) + boardVisible * 0.95);
        ctx.closePath();
      } else {
        ctx.moveTo(imgX(324), imgY(872));
        ctx.lineTo(imgX(369), imgY(872));
      }
    }
    ctx.fillStyle = "rgba(235, 237, 235, 0.88)";
    ctx.strokeStyle = "rgba(42, 50, 46, 0.72)";
    ctx.lineWidth = Math.max(1, 1.4 * sx);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = "rgba(79, 93, 86, 0.22)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y + height - 1);
    ctx.lineTo(x + width, y + height - 1);
    ctx.stroke();
    ctx.restore();
  }

  function updateMetrics(rig, performance) {
    const absHeading = Math.abs(rig.headingDeg);
    const main = rig.sails.find((s) => s.name === "main");
    const jib = rig.sails.find((s) => s.name === "jib");

    metricPoint.textContent = pointOfSail(absHeading);
    metricTack.textContent = rig.tack;
    metricMain.textContent = trimStatus(main);
    metricJib.textContent = jib ? trimStatus(jib) : "n/a";
    metricForce.textContent = `${performance.driveValue} / ${performance.heelValue}`;
  }

  function frame(now) {
    const scene = buildScene();
    const activeRig = scene.activeRig;
    const performance = computePerformance(activeRig);
    const elapsed = Math.min(0.042, Math.max(0.001, (now - state.lastTime) / 1000));
    state.lastTime = now;
    const dt = state.reducedMotion ? elapsed * 0.45 : elapsed;

    ctx.fillStyle = "rgba(232, 242, 237, 0.16)";
    ctx.fillRect(0, 0, state.width, state.height);
    for (const boat of scene.boats) {
      drawNoGoZone(boat);
    }
    drawDriveGauge(performance, activeRig);
    drawPressure(scene);
    drawEddyGuides(scene, now);
    drawVectors(scene, now);
    drawParticles(scene, dt);
    for (const boat of scene.boats) {
      drawBoat(boat);
    }
    drawSailSurfaceFlow(scene, now);
    drawTelltales(scene, now);
    drawDaggerboardProfiles(scene);
    updateMetrics(activeRig, performance);

    requestAnimationFrame(frame);
  }

  function handleWheelZoom(event) {
    event.preventDefault();
    const factor = Math.exp(-event.deltaY * 0.0012);
    const nextZoom = clamp(state.zoom * factor, 0.65, 3.0);
    if (Math.abs(nextZoom - state.zoom) < 0.001) return;
    state.zoom = nextZoom;
    state.particles.forEach((p) => resetParticle(p, true));
    paintBackground();
  }

  function eventWorldPoint(event) {
    const rect = canvas.getBoundingClientRect();
    return screenToWorld(event.clientX - rect.left, event.clientY - rect.top);
  }

  function boatContainsPoint(rig, p) {
    const rel = sub(p, rig.center);
    const hx = dot(rel, rig.f);
    const hy = dot(rel, rig.starboard);
    const lengthRadius = rig.boatLength * 0.58;
    const beamRadius = rig.beam * 0.72;
    const ellipse = Math.pow(hx / lengthRadius, 2) + Math.pow(hy / beamRadius, 2);
    return hx > -rig.boatLength * 0.66 && hx < rig.boatLength * 0.62 && ellipse < 1.18;
  }

  function distanceToSegment(p, a, b) {
    const ab = sub(b, a);
    const abLen2 = dot(ab, ab) || 1;
    const t = clamp(dot(sub(p, a), ab) / abLen2, 0, 1);
    const nearest = add(a, scale(ab, t));
    return length(sub(p, nearest));
  }

  function tillerRudderHitAtPoint(rig, p) {
    const geometry = tillerRudderGeometry(rig);
    const hitRadius = Math.max(14 / state.zoom, rig.boatLength * 0.034);
    return distanceToSegment(p, geometry.aftTip, geometry.forwardTip) <= hitRadius;
  }

  function sailDistanceToPoint(sail, p) {
    let previous = sailSurfacePoint(sail, 0.75, 0);
    let closest = length(sub(p, sail.b));
    for (let i = 1; i <= 10; i += 1) {
      const next = sailSurfacePoint(sail, 0.75 + i * 0.25 / 10, 0);
      closest = Math.min(closest, distanceToSegment(p, previous, next));
      previous = next;
    }
    return closest;
  }

  function findSailHitAtPoint(p) {
    const scene = buildScene();
    for (let i = scene.boats.length - 1; i >= 0; i -= 1) {
      const rig = scene.boats[i];
      for (let j = rig.sails.length - 1; j >= 0; j -= 1) {
        const sail = rig.sails[j];
        const hitRadius = Math.max(22 / state.zoom, sail.chord * 0.055);
        if (sailDistanceToPoint(sail, p) <= hitRadius) {
          return {
            rig,
            mode: "sail",
            sailName: sail.name
          };
        }
      }
    }
    return null;
  }

  function findCanvasHitAtPoint(p) {
    return findSailHitAtPoint(p) || findBoatHitAtPoint(p);
  }

  function findBoatHitAtPoint(p) {
    const scene = buildScene();
    for (let i = scene.boats.length - 1; i >= 0; i -= 1) {
      const rig = scene.boats[i];
      if (tillerRudderHitAtPoint(rig, p)) {
        return {
          rig,
          mode: "tiller"
        };
      }
      if (bowMoveHitAtPoint(rig, p)) {
        return {
          rig,
          mode: "move"
        };
      }
    }
    return null;
  }

  function findBoatAtPoint(p) {
    const hit = findBoatHitAtPoint(p);
    return hit ? hit.rig : null;
  }

  function updateSailTrimFromPointer(drag, p) {
    const boat = state.boats[drag.boatIndex];
    const boatCount = state.secondBoat ? 2 : 1;
    const displayIndex = state.secondBoat ? drag.boatIndex : 0;
    const rig = buildRig(boat, drag.boatIndex, displayIndex, boatCount);
    const sail = rig.sails.find((item) => item.name === drag.sailName);
    if (!sail) return;

    const pull = sub(p, sail.a);
    if (length(pull) < 14 / state.zoom) return;

    const trimRad = Math.atan2(dot(pull, sail.sheetSide), dot(pull, rig.aft));
    const maxTrim = sail.name === "main" ? 95 : 100;
    const nextTrim = clamp(Math.round(trimRad * 180 / Math.PI), 5, maxTrim);
    const key = sail.name === "main" ? "mainDeg" : "jibDeg";
    if (Math.abs(nextTrim - boat[key]) < 0.5) return;

    boat[key] = nextTrim;
    syncInputsFromActiveBoat();
    updateControls();

    if (state.lastSailDragValue === null || Math.abs(nextTrim - state.lastSailDragValue) >= 2) {
      paintBackground();
      state.lastSailDragValue = nextTrim;
    }
  }

  function updateTillerFromPointer(drag, p) {
    const boat = state.boats[drag.boatIndex];
    const side = dot(sub(p, drag.stock), drag.starboard);
    const pointerFraction = clamp(side / (drag.beam * 0.52), -1, 1);
    const delta = pointerFraction - drag.startPointerFraction;
    const nextTiller = clamp(drag.startTillerDeg + delta * 32, -32, 32);
    const nextHeading = normalizeHeadingDeg(drag.startHeading - delta * 56);
    const headingChanged = Math.abs(nextHeading - boat.headingDeg) >= 0.5;
    const tillerChanged = Math.abs(nextTiller - (boat.tillerDeg || 0)) >= 0.5;

    if (!headingChanged && !tillerChanged) return;

    boat.tillerDeg = nextTiller;
    if (headingChanged) {
      boat.headingDeg = nextHeading;
      setRecommendedTrimForBoat(boat);
    }
    syncInputsFromActiveBoat();
    updateControls();

    if (
      state.lastTillerDragDeg === null ||
      Math.abs(nextTiller - state.lastTillerDragDeg) >= 1 ||
      state.lastHeadingDragDeg === null ||
      Math.abs(nextHeading - state.lastHeadingDragDeg) >= 1
    ) {
      paintBackground();
      state.lastTillerDragDeg = nextTiller;
      state.lastHeadingDragDeg = nextHeading;
    }
  }

  function handlePointerDown(event) {
    if (event.button !== undefined && event.button !== 0) return;
    const p = eventWorldPoint(event);
    const hit = findCanvasHitAtPoint(p);
    if (!hit) return;

    event.preventDefault();
    selectBoat(hit.rig.boatIndex);
    const boat = state.boats[hit.rig.boatIndex];
    const tillerGeometry = hit.mode === "tiller" ? tillerRudderGeometry(hit.rig) : null;
    state.drag = hit.mode === "sail"
      ? {
        type: "sail",
        pointerId: event.pointerId,
        boatIndex: hit.rig.boatIndex,
        sailName: hit.sailName
      }
      : hit.mode === "tiller"
      ? {
        type: "tiller",
        pointerId: event.pointerId,
        boatIndex: hit.rig.boatIndex,
        startHeading: boat.headingDeg,
        startTillerDeg: boat.tillerDeg || 0,
        startPointerFraction: clamp(dot(sub(p, tillerGeometry.stock), hit.rig.starboard) / (hit.rig.beam * 0.52), -1, 1),
        stock: tillerGeometry.stock,
        starboard: hit.rig.starboard,
        beam: hit.rig.beam
      }
      : {
        type: "move",
